<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Digital Fulfillment Command Center</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #17202a;
        --muted: #657180;
        --soft: #8a96a5;
        --line: #d8e0e8;
        --page: #f3f6f8;
        --panel: #ffffff;
        --panel-2: #f8fafb;
        --navy: #122436;
        --blue: #1e6aa5;
        --teal: #1f8a84;
        --green: #1f8f63;
        --amber: #c97812;
        --red: #c83a3a;
        --violet: #7654a6;
        --shadow: 0 16px 36px rgba(27, 42, 58, 0.10);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--page);
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
        line-height: 1.35;
      }

      button,
      input,
      select {
        font: inherit;
      }

      header {
        background: var(--navy);
        color: white;
        padding: 18px 28px;
      }

      .header-row {
        align-items: center;
        display: flex;
        gap: 16px;
        justify-content: space-between;
      }

      h1 {
        font-size: 26px;
        letter-spacing: 0;
        margin: 0;
      }

      header p {
        color: #c9d8e7;
        margin: 5px 0 0;
      }

      .back {
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.24);
        border-radius: 6px;
        color: var(--navy);
        cursor: pointer;
        display: none;
        font-weight: 700;
        padding: 9px 12px;
      }

      .app {
        margin: 18px auto 40px;
        width: min(1420px, calc(100% - 32px));
      }

      .market-overview {
        display: grid;
        gap: 14px;
        grid-template-columns: minmax(260px, 1.15fr) repeat(4, minmax(150px, 1fr));
        margin-bottom: 16px;
      }

      .overview-panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }

      .overview-panel.primary {
        border-left: 5px solid var(--blue);
      }

      .overview-eyebrow {
        color: var(--soft);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        margin-bottom: 8px;
        text-transform: uppercase;
      }

      .overview-value {
        font-size: 27px;
        font-weight: 800;
        line-height: 1.05;
      }

      .overview-note {
        color: var(--muted);
        font-size: 12px;
        margin-top: 8px;
      }

      .overview-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .chip {
        background: var(--panel-2);
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        padding: 6px 9px;
      }

      .page {
        display: none;
      }

      .page.active {
        display: block;
      }

      .home-grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(3, minmax(220px, 1fr));
      }

      .tile {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        cursor: pointer;
        min-height: 214px;
        overflow: hidden;
        padding: 0;
        text-align: left;
        transition: border-color 140ms ease, box-shadow 140ms ease, transform 140ms ease;
      }

      .tile:hover {
        border-color: rgba(30, 106, 165, 0.55);
        box-shadow: var(--shadow);
        transform: translateY(-2px);
      }

      .tile:focus-visible {
        outline: 3px solid rgba(30, 106, 165, 0.28);
        outline-offset: 2px;
      }

      .tile h2 {
        font-size: 23px;
        margin: 0;
      }

      .tile-icon {
        font-size: 28px;
      }

      .tile-metric {
        color: var(--ink);
        font-size: 22px;
        font-weight: 700;
      }

      .tile-sub {
        color: var(--muted);
        margin: 4px 0 0;
      }

      .tile-alert {
        color: var(--amber);
        font-size: 13px;
        font-weight: 700;
      }

      .tile-link {
        color: var(--blue);
        display: flex;
        font-weight: 700;
        justify-content: space-between;
        margin-top: 16px;
      }

      .tile-top {
        align-items: center;
        border-bottom: 1px solid var(--line);
        display: flex;
        gap: 12px;
        justify-content: space-between;
        padding: 16px 18px;
      }

      .tile-body {
        display: grid;
        gap: 12px;
        padding: 18px;
      }

      .tile-footer {
        align-items: center;
        border-top: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        padding: 12px 18px 15px;
      }

      .tile-accent {
        border-radius: 999px;
        height: 10px;
        width: 10px;
      }

      .tile-accent.picking {
        background: var(--blue);
      }

      .tile-accent.staging {
        background: var(--teal);
      }

      .tile-accent.dispensing {
        background: var(--green);
      }

      .tile-accent.returns {
        background: var(--violet);
      }

      .tile-accent.store {
        background: var(--amber);
      }

      .tile-trend {
        color: var(--muted);
        font-size: 12px;
      }

      .wide-tile {
        grid-column: span 2;
      }

      .page-title {
        align-items: end;
        display: flex;
        gap: 18px;
        justify-content: space-between;
        margin-bottom: 16px;
      }

      .page-title h2 {
        font-size: 25px;
        margin: 0;
      }

      .page-title p {
        color: var(--muted);
        margin: 5px 0 0;
      }

      .layout {
        display: grid;
        gap: 16px;
        grid-template-columns: minmax(0, 1fr) 320px;
      }

      .content-grid {
        display: grid;
        gap: 16px;
      }

      .kpis {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(5, minmax(130px, 1fr));
      }

      .section-grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }

      .card h3 {
        font-size: 17px;
        margin: 0 0 13px;
      }

      .mini-grid {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .metric {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 12px;
      }

      .metric-label {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 6px;
      }

      .metric-value {
        font-size: 24px;
        font-weight: 700;
      }

      .metric-note {
        color: var(--muted);
        font-size: 12px;
        margin-top: 4px;
      }

      .bar-list {
        display: grid;
        gap: 10px;
      }

      .bar-row {
        align-items: center;
        display: grid;
        gap: 10px;
        grid-template-columns: 118px 1fr 62px;
      }

      .bar-track {
        background: #e6ebf0;
        border-radius: 999px;
        height: 12px;
        overflow: hidden;
      }

      .bar-fill {
        background: var(--blue);
        height: 100%;
      }

      .bar-fill.green {
        background: var(--green);
      }

      .bar-fill.amber {
        background: var(--amber);
      }

      .bar-fill.red {
        background: var(--red);
      }

      .chart {
        min-height: 220px;
      }

      .chart svg {
        height: 210px;
        width: 100%;
      }

      table {
        border-collapse: collapse;
        font-size: 13px;
        width: 100%;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 9px 7px;
        text-align: left;
        white-space: nowrap;
      }

      th {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
      }

      .sidebar {
        display: grid;
        gap: 12px;
      }

      .alert {
        border-left: 5px solid var(--amber);
        background: var(--panel);
        border-radius: 8px;
        padding: 12px;
      }

      .alert.red {
        border-left-color: var(--red);
      }

      .alert.green {
        border-left-color: var(--green);
      }

      .alert-title {
        font-weight: 700;
        margin-bottom: 4px;
      }

      .alert p {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.35;
        margin: 0;
      }

      .feature-list {
        display: grid;
        gap: 8px;
      }

      .feature {
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        display: grid;
        gap: 10px;
        grid-template-columns: 1fr auto;
        padding: 10px;
      }

      .feature strong {
        display: block;
      }

      .feature span {
        color: var(--muted);
        display: block;
        font-size: 12px;
        margin-top: 2px;
      }

      .badge {
        background: #e8f1f8;
        border-radius: 999px;
        color: var(--blue);
        font-size: 12px;
        font-weight: 700;
        padding: 5px 8px;
      }

      .selector {
        align-items: center;
        display: flex;
        gap: 10px;
      }

      .selector input,
      .selector select {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 9px 10px;
      }

      .store-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fill, minmax(135px, 1fr));
        margin-bottom: 16px;
      }

      .store-button {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        cursor: pointer;
        padding: 13px;
        text-align: left;
      }

      .store-button.active,
      .store-button:hover {
        border-color: var(--blue);
        box-shadow: inset 0 0 0 1px var(--blue);
      }

      .store-button strong {
        display: block;
        font-size: 16px;
      }

      .store-button span {
        color: var(--muted);
        font-size: 12px;
      }

      .store-dashboard {
        display: none;
      }

      .store-dashboard.active {
        display: block;
      }

      .word-cloud {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 9px;
        min-height: 110px;
      }

      .word-cloud span {
        color: var(--blue);
        font-weight: 700;
      }

      .word-cloud span:nth-child(2n) {
        color: var(--teal);
        font-size: 22px;
      }

      .word-cloud span:nth-child(3n) {
        color: var(--violet);
        font-size: 18px;
      }

      .note {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }

      .live-strip {
        align-items: center;
        background: #e8f4ee;
        border: 1px solid #b8dac8;
        border-radius: 8px;
        display: flex;
        gap: 10px;
        justify-content: space-between;
        margin-bottom: 14px;
        padding: 11px 14px;
      }

      .live-strip.fresh {
        animation: live-flash 900ms ease;
      }

      @keyframes live-flash {
        0% { background: #c8efd9; border-color: #64bb88; }
        100% { background: #e8f4ee; border-color: #b8dac8; }
      }

      .live-label {
        align-items: center;
        display: flex;
        gap: 8px;
        font-size: 13px;
        font-weight: 700;
      }

      .live-dot {
        background: var(--green);
        border-radius: 50%;
        box-shadow: 0 0 0 4px rgba(31, 143, 99, 0.14);
        height: 9px;
        width: 9px;
      }

      .live-meta {
        color: var(--muted);
        font-size: 12px;
        text-align: right;
      }

      .override-panel {
        border-top: 4px solid var(--navy);
      }

      .override-controls {
        display: grid;
        gap: 10px;
      }

      .override-controls select,
      .override-controls input {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 9px 10px;
        width: 100%;
      }

      .override-controls button {
        background: var(--navy);
        border: 0;
        border-radius: 6px;
        color: white;
        cursor: pointer;
        font-weight: 700;
        padding: 10px 12px;
      }

      .override-log {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }

      .override-entry {
        background: #f4f7fa;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-size: 12px;
        padding: 9px;
      }

      @media (max-width: 1100px) {
        .home-grid,
        .market-overview,
        .layout,
        .section-grid,
        .kpis {
          grid-template-columns: 1fr;
        }

        .wide-tile {
          grid-column: span 1;
        }
      }

      @media (max-width: 760px) {
        .header-row,
        .page-title,
        .selector {
          align-items: stretch;
          flex-direction: column;
        }

        table {
          display: block;
          overflow-x: auto;
        }

        .mini-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-row">
        <div>
          <h1>Digital Fulfillment Command Center</h1>
          <p>Market Manager Dashboard</p>
        </div>
        <button class="back" id="back-home" type="button">← Home</button>
      </div>
    </header>

    <main class="app">
      <section class="live-strip">
        <div class="live-label"><span class="live-dot"></span><span id="live-mode">Connecting live operations...</span></div>
        <div class="live-meta" id="live-meta">Waiting for first update</div>
      </section>
      <section class="page active" id="home-page">
        <section class="market-overview" id="market-overview"></section>
        <div class="home-grid" id="home-tiles"></div>
      </section>

      <section class="page" id="picking-page"></section>
      <section class="page" id="staging-page"></section>
      <section class="page" id="dispensing-page"></section>
      <section class="page" id="returns-page"></section>
      <section class="page" id="store-page"></section>
    </main>

    <script src="../live-config.js"></script>
    <script>
      const dataPath = "../data/";
      const configuredApiUrl = (window.LIVE_API_URL || "").replace(/\/$/, "");
      const liveApiUrl = new URLSearchParams(window.location.search).get("api") || configuredApiUrl;
      const state = {
        stores: [],
        employees: [],
        orders: [],
        rankings: [],
        scorecards: [],
        bottlenecks: [],
        returns: [],
        summary: {},
        selectedStoreId: "",
        liveMode: "loading",
        lastLiveUpdate: "",
        liveTickCount: 0,
      };

      const pageMeta = {
        picking: {
          title: "📦 Picking Command Page",
          subtitle: "Picker productivity, queue health, item accuracy, fatigue, and pick path performance.",
          color: "blue",
        },
        staging: {
          title: "📍 Staging Command Page",
          subtitle: "Capacity, zone balance, cold chain compliance, retrieval speed, and staging bottlenecks.",
          color: "teal",
        },
        dispensing: {
          title: "🚗 Dispensing Command Page",
          subtitle: "Customer wait, curbside flow, ratings, arrivals, no-shows, and SLA warnings.",
          color: "green",
        },
        returns: {
          title: "🔄 Returns & Exceptions Command Page",
          subtitle: "Returns, cancellations, failed deliveries, complaints, refunds, and risk alerts.",
          color: "violet",
        },
      };

      function parseCsv(text) {
        const [headerLine, ...lines] = text.trim().split(/\r?\n/);
        const headers = headerLine.split(",");
        return lines.filter(Boolean).map((line) => {
          const values = line.split(",");
          return Object.fromEntries(headers.map((header, index) => [header, values[index] ?? ""]));
        });
      }

      async function loadCsv(name) {
        const response = await fetch(dataPath + name);
        if (!response.ok) throw new Error(`Unable to load ${name}`);
        return parseCsv(await response.text());
      }

      function number(value, fallback = 0) {
        const parsed = Number(value);
        return Number.isFinite(parsed) ? parsed : fallback;
      }

      function avg(rows, field) {
        if (!rows.length) return 0;
        return rows.reduce((sum, row) => sum + number(row[field]), 0) / rows.length;
      }

      function pct(value) {
        return `${number(value).toFixed(1)}%`;
      }

      function minutes(value) {
        return `${number(value).toFixed(1)} min`;
      }

      function formatNumber(value) {
        return Math.round(number(value)).toLocaleString();
      }

      function updateLiveStrip(mode, summary = {}, previous = {}) {
        state.liveMode = mode;
        state.lastLiveUpdate = summary.generated_at || new Date().toISOString();
        const modeLabel = mode === "api" ? "LIVE API + MongoDB" : "LIVE DEMO SIMULATION";
        const changed = summary.stores_updated_this_tick ?? 5;
        const pickDelta = number(summary.avg_pick_rate) - number(previous.avg_pick_rate, summary.avg_pick_rate);
        const activeDelta = number(summary.active_employee_count) - number(previous.active_employee_count, summary.active_employee_count);
        const sign = (value) => value > 0 ? `+${value}` : `${value}`;
        const deltaText = previous.generated_at
          ? ` · Pick ${sign(pickDelta.toFixed(2))}/hr · Active ${sign(Math.round(activeDelta))}`
          : "";
        document.getElementById("live-mode").textContent = modeLabel;
        document.getElementById("live-meta").textContent = `${changed} stores changed · Tick ${state.liveTickCount} · ${new Date(state.lastLiveUpdate).toLocaleTimeString()}${deltaText}`;
        const strip = document.querySelector(".live-strip");
        strip.classList.remove("fresh");
        void strip.offsetWidth;
        strip.classList.add("fresh");
      }

      function mutateDemoSummary() {
        const summary = state.summary;
        const previous = { ...summary };
        summary.avg_pick_rate = clampNumber(number(summary.avg_pick_rate) + randomBetween(-1.2, 1.2), 28, 68).toFixed(2);
        summary.avg_staging_minutes = clampNumber(number(summary.avg_staging_minutes) + randomBetween(-0.5, 0.5), 3, 18).toFixed(2);
        summary.avg_customer_wait_minutes = clampNumber(number(summary.avg_customer_wait_minutes) + randomBetween(-0.7, 0.7), 2, 20).toFixed(2);
        summary.avg_customer_rating = clampNumber(number(summary.avg_customer_rating) + randomBetween(-0.08, 0.08), 3.4, 4.95).toFixed(2);
        summary.sla_percent = clampNumber(number(summary.sla_percent) + randomBetween(-1.1, 1.1), 76, 99).toFixed(2);
        summary.generated_at = new Date().toISOString();
        summary.stores_updated_this_tick = 5;
        state.liveTickCount += 1;
        updateLiveStrip("demo", summary, previous);
        renderHome();
      }

      function randomBetween(low, high) {
        return low + Math.random() * (high - low);
      }

      function clampNumber(value, low, high) {
        return Math.max(low, Math.min(high, value));
      }

      async function refreshFromLiveApi() {
        if (!liveApiUrl) return false;
        const response = await fetch(`${liveApiUrl}/api/live`, { cache: "no-store" });
        if (!response.ok) throw new Error("Live API unavailable");
        const payload = await response.json();
        const previous = { ...state.summary };
        const isFreshTick = payload.summary.generated_at !== previous.generated_at;
        state.summary = { ...state.summary, ...payload.summary };
        if (payload.stores?.length) {
          const liveByStore = Object.fromEntries(payload.stores.map((store) => [store.store_id, store]));
          state.rankings = state.rankings.map((store) => {
            const live = liveByStore[store.store_id];
            return live ? {
              ...store,
              sla_percent: live.sla_percent,
              avg_pick_rate: live.pick_rate,
              avg_staging_minutes: live.staging_minutes,
              avg_customer_wait_minutes: live.customer_wait_minutes,
              avg_customer_rating: live.customer_rating,
              efficiency_score: live.efficiency_score,
            } : store;
          }).sort((a, b) => number(b.efficiency_score) - number(a.efficiency_score));
        }
        if (isFreshTick) state.liveTickCount += 1;
        updateLiveStrip("api", payload.summary, isFreshTick ? previous : {});
        renderHome();
        return true;
      }

      function groupBy(rows, key) {
        return rows.reduce((groups, row) => {
          const groupKey = typeof key === "function" ? key(row) : row[key];
          groups[groupKey] = groups[groupKey] || [];
          groups[groupKey].push(row);
          return groups;
        }, {});
      }

      function topRows(rows, count, field, direction = "desc") {
        return [...rows].sort((a, b) => {
          const delta = number(a[field]) - number(b[field]);
          return direction === "desc" ? -delta : delta;
        }).slice(0, count);
      }

      function showPage(name) {
        document.querySelectorAll(".page").forEach((page) => page.classList.remove("active"));
        document.getElementById(`${name}-page`).classList.add("active");
        document.getElementById("back-home").style.display = name === "home" ? "none" : "inline-block";
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function metric(label, value, note = "") {
        return `
          <div class="metric">
            <div class="metric-label">${label}</div>
            <div class="metric-value">${value}</div>
            ${note ? `<div class="metric-note">${note}</div>` : ""}
          </div>
        `;
      }

      function table(headers, rows) {
        return `
          <table>
            <thead><tr>${headers.map((header) => `<th>${header}</th>`).join("")}</tr></thead>
            <tbody>${rows.join("")}</tbody>
          </table>
        `;
      }

      function barList(rows, labelField, valueField, maxValue, className = "") {
        return `
          <div class="bar-list">
            ${rows.map((row) => {
              const width = Math.max(4, Math.min(100, number(row[valueField]) / maxValue * 100));
              return `
                <div class="bar-row">
                  <span>${row[labelField]}</span>
                  <div class="bar-track"><div class="bar-fill ${className}" style="width:${width}%"></div></div>
                  <strong>${number(row[valueField]).toFixed(1)}</strong>
                </div>
              `;
            }).join("")}
          </div>
        `;
      }

      function lineChart(points, color = "var(--blue)") {
        const values = points.map(number);
        const max = Math.max(...values, 1);
        const min = Math.min(...values, 0);
        const range = Math.max(max - min, 1);
        const coords = values.map((value, index) => {
          const x = values.length === 1 ? 0 : (index / (values.length - 1)) * 100;
          const y = 92 - ((value - min) / range) * 78;
          return `${x},${y}`;
        }).join(" ");
        return `
          <div class="chart">
            <svg viewBox="0 0 100 100" preserveAspectRatio="none">
              <polyline points="${coords}" fill="none" stroke="${color}" stroke-width="3" />
              <line x1="0" y1="92" x2="100" y2="92" stroke="#d7dee7" stroke-width="1" />
            </svg>
          </div>
        `;
      }

      function scatterPlot(rows, xField, yField) {
        const maxX = Math.max(...rows.map((row) => number(row[xField])), 1);
        const maxY = Math.max(...rows.map((row) => number(row[yField])), 1);
        return `
          <div class="chart">
            <svg viewBox="0 0 100 100">
              ${rows.slice(0, 180).map((row) => {
                const x = 6 + number(row[xField]) / maxX * 88;
                const y = 94 - number(row[yField]) / maxY * 88;
                return `<circle cx="${x}" cy="${y}" r="1.5" fill="var(--blue)" opacity="0.42" />`;
              }).join("")}
              <line x1="6" y1="94" x2="96" y2="94" stroke="#d7dee7" />
              <line x1="6" y1="4" x2="6" y2="94" stroke="#d7dee7" />
            </svg>
          </div>
        `;
      }

      function featureList(items) {
        return `<div class="feature-list">${items.map((item) => `
          <div class="feature">
            <div><strong>${item.title}</strong><span>${item.body}</span></div>
            <span class="badge">${item.badge}</span>
          </div>
        `).join("")}</div>`;
      }

      function alertBlock(title, body, tone = "amber") {
        const cls = tone === "red" ? "red" : tone === "green" ? "green" : "";
        return `<div class="alert ${cls}"><div class="alert-title">${title}</div><p>${body}</p></div>`;
      }

      function overridePanel(scope) {
        const id = `override-${scope}`;
        return `
          <article class="card override-panel">
            <h3>Manager Override Authority</h3>
            <p class="note">Live metrics are read-only. Overrides create auditable action decisions for operations teams.</p>
            <div class="override-controls">
              <select id="${id}-action">
                <option value="Reassign labor">Reassign labor</option>
                <option value="Prioritize queue">Prioritize queue</option>
                <option value="Escalate store">Escalate store</option>
                <option value="Approve exception">Approve exception</option>
                <option value="Open action plan">Open action plan</option>
              </select>
              <input id="${id}-reason" placeholder="Reason for override">
              <button type="button" data-override="${scope}">Log Override</button>
            </div>
            <div class="override-log" id="${id}-log"></div>
          </article>
        `;
      }

      function bindOverride(scope) {
        const button = document.querySelector(`[data-override="${scope}"]`);
        if (!button) return;
        button.addEventListener("click", () => {
          const action = document.getElementById(`override-${scope}-action`).value;
          const reasonInput = document.getElementById(`override-${scope}-reason`);
          const reason = reasonInput.value.trim() || "Manager discretion";
          const log = document.getElementById(`override-${scope}-log`);
          const timestamp = new Date().toLocaleString();
          log.insertAdjacentHTML("afterbegin", `<div class="override-entry"><strong>${action}</strong><br>${reason}<br><span>${timestamp} · Metrics unchanged</span></div>`);
          reasonInput.value = "";
        });
      }

          `<section class="section-grid">
            <article class="card"><h3>Reason Breakdown</h3>${barList(groupedReasons, "reason", "count", Math.max(...groupedReasons.map((row) => row.count)), "amber")}</article>
            <article class="card"><h3>Returns by Store</h3>${barList(Object.entries(groupBy(state.returns, "store_id")).map(([store_id, rows]) => ({ store_id, count: rows.length })).sort((a, b) => b.count - a.count).slice(0, 10), "store_id", "count", 30, "red")}</article>
          </section>`,
          `<section class="section-grid">
            <article class="card"><h3>Returns by Category</h3>${barList(Object.entries(groupBy(state.returns, "category")).map(([category, rows]) => ({ category, count: rows.length })), "category", "count", 160, "teal")}</article>
            <article class="card"><h3>Returns Trend</h3>${lineChart([22, 28, 25, 35, 31, 38, 44, 40, 47, 51, 49, 57], "var(--violet)")}</article>
          </section>`,
          `<section class="section-grid">
            <article class="card"><h3>Exceptions</h3><div class="mini-grid">${metric("Order Cancellations", groupedTypes.find((row) => row.type === "cancellation")?.count || 0)}${metric("Failed Deliveries", groupedTypes.find((row) => row.type === "failed_delivery")?.count || 0)}${metric("Customer Complaints", groupedTypes.find((row) => row.type === "complaint")?.count || 0)}${metric("Refund Requests", groupedTypes.find((row) => row.type === "refund_request")?.count || 0)}</div></article>
            <article class="card"><h3>Exception by Type</h3>${barList(groupedTypes, "type", "count", Math.max(...groupedTypes.map((row) => row.count)), "blue")}</article>
          </section>`,
        ];

        const alerts = [
          alertBlock("High Return Rate Alert", `Current exception rate is ${pct(returnRate)}.`, returnRate > 10 ? "red" : "amber"),
          alertBlock("Fraud Suspicion", "High refund-risk scores are isolated for review.", "red"),
          alertBlock("Unresolved Returns", `${state.returns.filter((row) => row.status === "pending").length} cases are pending resolution.`, "amber"),
          alertBlock("Customer Dispute", "Escalated complaints are routed to store leadership.", "red"),
          alertBlock("Return Trend Spike", "Late-order returns are trending above the prior baseline.", "amber"),
        ];

        document.getElementById("returns-page").innerHTML = pageShell("returns", topKpis, sections, alerts);
        bindOverride("returns");
      }

      function renderStorePage() {
        state.selectedStoreId = state.selectedStoreId || state.rankings[0].store_id;
        document.getElementById("store-page").innerHTML = `
          <div class="page-title">
            <div>
              <h2>🏪 Total Store Drill-Down</h2>
              <p>Select a store, then inspect picking, staging, dispensing, delivery, trends, people, and action plans.</p>
            </div>
            <div class="selector">
              <input id="store-search" type="search" placeholder="Search store or city">
              <select id="store-select">${state.rankings.map((store) => `<option value="${store.store_id}">Store #${store.store_number} - ${store.city}</option>`).join("")}</select>
            </div>
          </div>
          <div class="store-grid" id="store-grid"></div>
          <div class="store-dashboard active" id="store-dashboard"></div>
        `;

        document.getElementById("store-select").value = state.selectedStoreId;
        document.getElementById("store-select").addEventListener("change", (event) => {
          state.selectedStoreId = event.target.value;
          renderStoreButtons();
          renderSelectedStore();
        });
        document.getElementById("store-search").addEventListener("input", renderStoreButtons);
        renderStoreButtons();
        renderSelectedStore();
      }

      function renderStoreButtons() {
        const search = document.getElementById("store-search").value.toLowerCase();
        const filtered = state.rankings.filter((store) => {
          return !search || store.store_number.includes(search) || store.city.toLowerCase().includes(search) || store.state.toLowerCase().includes(search);
        }).slice(0, 18);
        document.getElementById("store-grid").innerHTML = filtered.map((store) => `
          <button class="store-button ${store.store_id === state.selectedStoreId ? "active" : ""}" data-store="${store.store_id}" type="button">
            <strong>Store #${store.store_number}</strong>
            <span>${store.sla_percent}% SLA · ${store.city}</span>
          </button>
        `).join("");
        document.querySelectorAll("[data-store]").forEach((button) => {
          button.addEventListener("click", () => {
            state.selectedStoreId = button.dataset.store;
            document.getElementById("store-select").value = state.selectedStoreId;
            renderStoreButtons();
            renderSelectedStore();
          });
        });
      }

      function renderSelectedStore() {
        const store = state.rankings.find((row) => row.store_id === state.selectedStoreId) || state.rankings[0];
        const storeOrders = state.orders.filter((order) => order.store_id === store.store_id);
        const storeEmployees = state.scorecards.filter((employee) => employee.store_id === store.store_id);
        const storeReturns = state.returns.filter((row) => row.store_id === store.store_id);
        const rank = state.rankings.findIndex((row) => row.store_id === store.store_id) + 1;
        const companyPickAvg = number(state.summary.avg_pick_rate);
        const topPickers = topRows(storeEmployees.filter((row) => row.role === "picker"), 5, "performance_score");
        const topStagers = topRows(storeEmployees.filter((row) => row.role === "stager"), 5, "performance_score");
        const topDispensers = topRows(storeEmployees.filter((row) => row.role === "dispenser"), 5, "performance_score");

        document.getElementById("store-dashboard").innerHTML = `
          <div class="layout">
            <div class="content-grid">
              <section class="kpis">
                ${metric(`Store #${store.store_number}`, `${store.city}, ${store.state}`, "selected store")}
                ${metric("Health Score", store.efficiency_score, "0-100 composite")}
                ${metric("Today's Orders", formatNumber(store.orders), "store volume")}
                ${metric("SLA Compliance", `${store.sla_percent}%`, "on-time fulfillment")}
                ${metric("Customer Rating", store.avg_customer_rating, "average stars")}
              </section>
              <section class="section-grid">
                <article class="card"><h3>Picking at this Store</h3><div class="mini-grid">${metric("Pick Rate", `${store.avg_pick_rate}/hr`)}${metric("vs Company Avg", `${(number(store.avg_pick_rate) - companyPickAvg).toFixed(1)}/hr`)}${metric("Pick Issues", store.avg_pick_rate < companyPickAvg ? "Needs review" : "Healthy")}${metric("First-Time Pick", `${(100 - number(store.substitution_percent) * 0.8).toFixed(1)}%`)}</div>${table(["Top Picker", "Orders", "Rate", "Score"], topPickers.map((row) => `<tr><td>${row.name}</td><td>${row.orders_handled}</td><td>${row.average_value}</td><td>${row.performance_score}</td></tr>`))}</article>
                <article class="card"><h3>Staging at this Store</h3><div class="mini-grid">${metric("Stage Time", `${store.avg_staging_minutes} min`)}${metric("Capacity", `${Math.min(98, Math.round(number(store.orders) / 3))}%`)}${metric("Misplaced Orders", Math.round(number(store.orders) * 0.018))}${metric("Cold Chain", "96%")}</div>${table(["Top Stager", "Orders", "Minutes", "Score"], topStagers.map((row) => `<tr><td>${row.name}</td><td>${row.orders_handled}</td><td>${row.average_value}</td><td>${row.performance_score}</td></tr>`))}</article>
              </section>
              <section class="section-grid">
                <article class="card"><h3>Dispensing at this Store</h3><div class="mini-grid">${metric("Customer Wait", `${store.avg_customer_wait_minutes} min`)}${metric("Curbside Use", "73%")}${metric("No-Show Rate", "3.1%")}${metric("Rating", store.avg_customer_rating)}</div>${table(["Top Dispenser", "Orders", "Minutes", "Score"], topDispensers.map((row) => `<tr><td>${row.name}</td><td>${row.orders_handled}</td><td>${row.average_value}</td><td>${row.performance_score}</td></tr>`))}</article>
                <article class="card"><h3>Delivery from this Store</h3><div class="mini-grid">${metric("Delivery Volume", formatNumber(storeOrders.filter((row) => row.order_type === "delivery").length))}${metric("On-Time Delivery", `${Math.max(80, number(store.sla_percent) - 3).toFixed(1)}%`)}${metric("Avg Delivery Time", `${avg(storeOrders.filter((row) => row.order_type === "delivery"), "fulfillment_minutes").toFixed(1)} min`)}${metric("Delivery Issues", Math.round(storeReturns.length * 0.16))}</div>${featureList([{ title: "Top Drivers", body: "Driver table placeholder for delivery partner feed.", badge: "ready" }, { title: "Failed Deliveries", body: "Exceptions from this store delivery queue.", badge: storeReturns.filter((row) => row.exception_type === "failed_delivery").length }])}</article>
              </section>
              <section class="section-grid">
                <article class="card"><h3>Store Trends</h3>${lineChart([store.orders * 0.72, store.orders * 0.82, store.orders * 0.79, store.orders * 0.88, store.orders * 0.92, store.orders], "var(--blue)")}${featureList([{ title: "Pick Rate Trend", body: "Modeled weekly progress from order history.", badge: "up" }, { title: "SLA Trend", body: "On-time performance across recent periods.", badge: `${store.sla_percent}%` }, { title: "Rating Trend", body: "Customer satisfaction movement.", badge: store.avg_customer_rating }, { title: "Return Rate Trend", body: "Store exceptions compared with orders.", badge: `${(storeReturns.length / Math.max(storeOrders.length, 1) * 100).toFixed(1)}%` }])}</article>
                <article class="card"><h3>Employee Deep Dive</h3>${table(["Employee", "Role", "Orders", "Metric", "Score"], topRows(storeEmployees, 12, "performance_score").map((row) => `<tr><td>${row.name}</td><td>${row.role}</td><td>${row.orders_handled}</td><td>${row.average_value}</td><td>${row.performance_score}</td></tr>`))}</article>
              </section>
              <section class="section-grid">
                <article class="card"><h3>Store Comparison</h3><div class="mini-grid">${metric("vs District Avg", `${(number(store.efficiency_score) - avg(state.rankings, "efficiency_score")).toFixed(1)}`)}${metric("vs Best Store", `${(number(state.rankings[0].efficiency_score) - number(store.efficiency_score)).toFixed(1)} gap`)}${metric("Store Ranking", `#${rank} of ${state.rankings.length}`)}${metric("Shift Coverage", "88%")}</div></article>
                <article class="card"><h3>Store Action Plan</h3>${featureList([
                  { title: "Improve weakest stage", body: "Prioritize the highest bottleneck score for this store.", badge: state.bottlenecks.find((row) => row.store_id === store.store_id)?.worst_stage || "review" },
                  { title: "Coach low performers", body: "Assign training to employees below store benchmark.", badge: storeEmployees.filter((row) => number(row.performance_score) < 45).length },
                  { title: "Reduce substitutions", body: "Partner with inventory on top missing categories.", badge: `${store.substitution_percent}%` },
                  { title: "Protect SLA", body: "Add labor before high-volume pickup windows.", badge: `${store.sla_percent}%` },
                ])}</article>
              </section>
            </div>
            <aside class="sidebar">
              ${overridePanel("store")}
              ${alertBlock("Store SLA Alert", number(store.sla_percent) < 90 ? "Below 90% SLA. Immediate action needed." : "SLA is above the critical threshold.", number(store.sla_percent) < 90 ? "red" : "green")}
              ${alertBlock("Staff Shortage", "Coverage model suggests additional picker support during peak windows.", "amber")}
              ${alertBlock("Equipment Issue", "Scanner issue placeholder ready for device telemetry.", "amber")}
              ${alertBlock("Space Constraint", "Staging fullness should be reviewed before evening pickup.", "red")}
              ${alertBlock("Customer Complaints", `${storeReturns.filter((row) => row.exception_type === "complaint").length} recent complaint exceptions.`, "amber")}
            </aside>
          </div>
        `;
        bindOverride("store");
      }

      async function init() {
        const [stores, employees, orders, rankings, scorecards, bottlenecks, summary, returns] = await Promise.all([
          loadCsv("stores.csv"),
          loadCsv("employees.csv"),
          loadCsv("orders_enriched.csv"),
          loadCsv("store_rankings.csv"),
          loadCsv("employee_scorecards.csv"),
          loadCsv("stage_bottlenecks.csv"),
          loadCsv("market_summary.csv"),
          loadCsv("returns_exceptions.csv"),
        ]);

        state.stores = stores;
        state.employees = employees;
        state.orders = orders;
        state.rankings = rankings;
        state.scorecards = scorecards;
        state.bottlenecks = bottlenecks;
        state.summary = summary[0];
        state.returns = returns;

        renderHome();
        ["picking", "staging", "dispensing", "returns"].forEach(renderStagePage);
        renderStorePage();
        try {
          const connected = await refreshFromLiveApi();
          if (!connected) mutateDemoSummary();
        } catch (error) {
          mutateDemoSummary();
        }
        window.setInterval(async () => {
          try {
            const connected = await refreshFromLiveApi();
            if (!connected) mutateDemoSummary();
          } catch (error) {
            mutateDemoSummary();
          }
        }, 15000);
      }

      document.getElementById("back-home").addEventListener("click", () => showPage("home"));
      init().catch((error) => {
        document.querySelector(".app").innerHTML = `<section class="card"><h2>Dashboard load failed</h2><p>${error.message}</p></section>`;
      });
    </script>
  </body>
</html>
